name: CI - Tests MLOps

env:
    CI: true
    PYTHONPATH: .

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip pytest setuptools wheel
          pip install -r requirements.txt
          pip install evidently==0.7.20
      - name: Run tests
        run: |
          pytest -v

  build-docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Build Docker image
      run: |
        docker build -t homecredit_api .

  deploy:
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Prepare clean repo for Hugging Face
        run: |
          # remove git history
          rm -rf .git
          git init
          git branch -M main
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          rm -rf notebook/
          rm -f inference_pool.json
          
          rm -f *.onnx
          rm -f api/*.onnx
          echo "notebook/" >> .gitignore
          echo "*.html" >> .gitignore
          echo "*.json" >> .gitignore
          echo "*.onnx" >> .gitignore
          git add .
          git commit -m "Clean deploy to HF"

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |

          git remote add space https://Fouxy84:$HF_TOKEN@huggingface.co/spaces/Fouxy84/MLops_2
          git push space main --force