<source>
  @type tail
  path /logs/prediction_logs.json
  #pos_file /fluentd/log/fluentd.pos
  tag mlops.predictions
  read_from_head true
  format json
</source>

<source>
  @type tail
  path /logs/profiling_logs.json
  #pos_file /fluentd/log/fluentd.pos
  tag mlops.profiling
  read_from_head true
  format json
</source>

<match mlops.predictions>
  @type elasticsearch
  host elasticsearch
  port 9200
  scheme http

  logstash_format false
  index_name mlops_predictions

  reconnect_on_error true
  reload_connections true
  request_timeout 15s
  @log_level info
</match>

<match mlops.profiling>
  @type elasticsearch
  host elasticsearch
  port 9200
  scheme http

  logstash_format false
  index_name mlops_profiling

  reconnect_on_error true
  reload_connections true
  request_timeout 15s
  @log_level info
</match>