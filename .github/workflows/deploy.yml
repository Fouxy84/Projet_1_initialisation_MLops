
name: Sync to Hugging Face hub
on:
  push:
    branches: [main]

  # to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Prepare clean repo for Hugging Face
        run: |
          # Remove git history to avoid pushing large blobs from the past
          rm -rf .git
          git init
          git branch -M main
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          
          # Force remove *.onnx from the local .gitignore so we CAN push them
          sed -i '/\*.onnx/d' .gitignore
          
          # Initialize Git LFS so Hugging Face accepts the models
          git lfs install
          git lfs track "*.onnx"
          git add .gitattributes
          
          # Remove files that are too large or unnecessary for Hugging Face Space
          rm -rf notebook/
          rm -rf logs/
          rm -f inference_pool.json
          
          echo "notebook/" >> .gitignore
          echo "logs/" >> .gitignore
          echo "*.html" >> .gitignore
          echo "*.json" >> .gitignore
          
          git add .
          git commit -m "Clean deploy to HF with LFS"

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push https://Fouxy84:$HF_TOKEN@huggingface.co/spaces/Fouxy84/MLops_2 main --force