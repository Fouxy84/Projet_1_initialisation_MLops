<source>
  @type tail
  path /logs/prediction_logs.json
  pos_file /fluentd/log/fluentd.pos
  tag mlops.predictions
  read_from_head true
  format json
</source>

<match mlops.predictions>
  @type elasticsearch
  host elasticsearch
  port 9200
  scheme http

  logstash_format false
  index_name mlops_predictions

  verify_es_version_at_start false
  reconnect_on_error true
  reload_connections true
  request_timeout 15s
  @log_level info
</match>